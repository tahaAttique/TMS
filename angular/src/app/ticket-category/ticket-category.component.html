<abp-page [title]="'::Menu:TicketCategories' | abpLocalization">
    <abp-page-toolbar-container class="col">
        <div class="text-end">
            <button class="btn btn-primary btn-sm" type="button" (click)="createCategory()">
                <span>{{'::AddCategory' | abpLocalization}}</span>
            </button>
        </div>
    </abp-page-toolbar-container>

    <div class="card">
        <div class="card-body">
            <form (ngSubmit)="this.list.get()">
                <div class="row mb-2">
                    <div class="input-group">
                        <input type="search" class="form-control" placeholder="Search Here" id="filterText"
                            [(ngModel)]="filters.filter" [ngModelOptions]="{standalone:true}"/>
                        <button type="submit" class="btn btn-primary" title="Search" (click)="this.list.get()">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <ngx-datatable [rows]="category.items" [count]="category.totalCount" [list]="list" default>
                <ngx-datatable-column [name]="'::Actions' | abpLocalization" [maxWidth]="180" [sortable]="false">
                    <ng-template let-row="row" ngx-datatable-cell-template>
                        <div ngbDropdown container="body" class="d-inline-block">
                            <button class="btn btn-primary btn-sm dropdown-toggle" data-toggle="dropdown"
                                aria-haspopup="true" ngbDropdownToggle>
                                <i class="fa fa-cog me-1"></i>{{ '::Actions' | abpLocalization }}
                            </button>
                            <div ngbDropdownMenu>
                                <button ngbDropdownItem (click)="editCategory(row.id)">
                                    {{ '::Edit' | abpLocalization }}
                                </button>
                                <button ngbDropdownItem (click)="delete(row.id)">
                                    {{ '::Delete' | abpLocalization }}
                                </button>
                            </div>
                        </div>
                    </ng-template>
                </ngx-datatable-column>
                <ngx-datatable-column [name]="'::Name' | abpLocalization" prop="name"></ngx-datatable-column>
                <ngx-datatable-column [name]="'::Description' | abpLocalization"
                    prop="description"></ngx-datatable-column>
            </ngx-datatable>
        </div>
    </div>
</abp-page>

<abp-modal [(visible)]="isModalOpen">
    <ng-template #abpHeader>
        <h3>{{( selectedCategory.id ? '::Edit' : '::NewCategory') | abpLocalization}}</h3>
    </ng-template>

    <ng-template #abpBody>
        <form [formGroup]="form" (ngSubmit)="save()">
            <div class="form-group mb-2">
                <label for="category-name" class="required form-label">{{'::Name' | abpLocalization}}</label>
                <input type="text" id="category-name" class="form-control" formControlName="name" autofocus />
            </div>

            <div class="form-group">
                <label for="category-description" class="required form-label">{{'::Description' | abpLocalization}}</label>
                <textarea id="category-description" formControlName="description" class="form-control" rows="4"></textarea>
            </div>
        </form>
    </ng-template>

    <ng-template #abpFooter>
        <button type="button" class="btn btn-secondary" (click)="isModalOpen = false">
            {{'::Cancel' | abpLocalization}}
        </button>
        <button class="btn btn-primary" (click)="save()">
            {{'::Save' | abpLocalization}}
        </button>
    </ng-template>
</abp-modal>
